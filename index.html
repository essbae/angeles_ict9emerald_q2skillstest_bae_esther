<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBMC Enroll Now</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Gill Sans';
    }
    h4{
      text-align: center;
      font-weight: bolder;
      font-size: 250%;
      color: #000000;
    }
    h5{
      text-align: center;
      color: #000000;
      font-weight: bold;
    }
    h6{
      font-weight: bold;
      font-size: 25px;
    }
    .blur-bg{
      position: fixed;
      width: 100%;
      height: 100vh;
      background-image: url("OBAN.jpg");
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      z-index: -1;
    }
    .navbar{
      background-color: #1f313c;
    }
    .navbar .nav-link{
      color: #ffffff; 
    }

    img.rounded-circle{
       width: 150px;
       height: auto;
       border-radius: 12px;
       border: 2px solid #3d637c;
       display: block;
       margin: 0 auto 10px auto;
    }

    .btn{
      background-color: #5e87a2;
      color: white;
      border-color: #3d637c;
    }
    .btn:hover{
      background-color: #2d4a5e;
      border-color: #243a49;
      color: white;
    }
    .form-container{
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      max-width: 1300px;
      margin: 0 auto 50px auto;
      padding: 30px;
      border-radius: 12px;
    }
    .form-row{
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      align-items: flex-end;
    }
    .form-row .form-group{
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    label{
      margin-bottom: 5px;
      display: block;
    }
    input, select{
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
      height: 42px;
    }
    .option-label{
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 0;
      font-size: 100%;
    }
    input[type="radio"], input[type="checkbox"]{
      width: auto;
      margin-right: 5px;
    }
    .form-button{
      text-align: center;
      margin-top: 20px;
    }
    button{
      background-color: #5e87a2;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 12px 25px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    button:hover{
      background-color: #2d4a5e;
    }
    .footer{
      background-color: #1f313c;
      color: white;
      text-align: center;
      padding: 15px 0;
    }

  </style>
</head>
<body>
  <div class="blur-bg"></div>

  <nav class="navbar navbar-expand-sm navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><img class="rounded" src="obmclogo.jpg" alt="logo" height="50px"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mynavbar">
        <ul class="navbar-nav me-auto mb-2 mb-sm-0">
          <li class="nav-item"><a class="nav-link" href=#>Home</a></li>
          <li class="nav-item"><a class="nav-link" href=#>About</a></li>
          <li class="nav-item"><a class="nav-link" href=#>Enroll</a></li>
          <li class="nav-item"><a class="nav-link" href=#>Contact</a></li>
        </ul>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="Search">
          <button class="btn" type="button">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <br>
  <br>

  <div class="page-header">
    <img src="obmclogo.jpg" alt="Logo" class="rounded-circle mb-2">
    <h4>OBMC Student Enrollment Form</h4>
    <h5>Fill out the form below to enroll for the upcoming school year</h5>
  </div>

  <br>

  <div class="form-container">
    <form>
      <h6>Student Information</h6>

      <div class="form-row">
        <div class="form-group">
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" placeholder="Enter first name">
        </div>
        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" placeholder="Enter last name">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="" disabled selected>Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Non-binary</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="grade">Grade Level</label>
          <select id="grade">
            <option value="" disabled selected>Select</option>
            <option>Junior Casa</option>
            <option>Junior Advanced Casa</option>
            <option>Grade 1</option>
            <option>Grade 2</option>
            <option>Grade 3</option>
            <option>Grade 4</option>
            <option>Grade 5</option>
            <option>Grade 6</option>
            <option>Grade 7</option>
            <option>Grade 8</option>
            <option>Grade 9</option>
            <option>Grade 10</option>
            <option>Grade 11</option>
            <option>Grade 12</option>
          </select>
        </div>
      </div>

      <h6>Contact Details</h6>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter email">

      <br>
      <br>

      <label for="contact">Contact Number</label>
      <input type="text" id="contact" placeholder="Enter contact number">

      <br>
      <br>

      <h6>Mode of Learning</h6>
      <label class="option-label"><input type="radio" name="mode" value="online"> Online</label>
      <label class="option-label"><input type="radio" name="mode" value="onsite"> Onsite</label>

      <label class="option-label">
        <input type="checkbox"> I confirm that the information provided is true and complete
      </label>

      <div class="form-button">
        <button type="submit">Submit Enrollment</button>
      </div>

    </form>
  </div>

  <div class="container-fluid footer text-light">
    @2025 Student Enrollment System | Esther Bae 9-Emerald
  </div>

</body>
</html>
